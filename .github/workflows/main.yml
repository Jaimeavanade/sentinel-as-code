name: Deploy Sentinel Content

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Check secrets presence (safe)
        shell: bash
        run: |
          if [ -z "${{ secrets.SENTINEL_CLIENTID }}" ]; then echo "SENTINEL_CLIENTID missing/empty"; exit 1; else echo "SENTINEL_CLIENTID ok"; fi
          if [ -z "${{ secrets.SENTINEL_TENANTID }}" ]; then echo "SENTINEL_TENANTID missing/empty"; exit 1; else echo "SENTINEL_TENANTID ok"; fi
          if [ -z "${{ secrets.SENTINEL_SUBSCRIPTIONID }}" ]; then echo "SENTINEL_SUBSCRIPTIONID missing/empty"; exit 1; else echo "SENTINEL_SUBSCRIPTIONID ok"; fi

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.SENTINEL_CLIENTID }}
          tenant-id: ${{ secrets.SENTINEL_TENANTID }}
          subscription-id: ${{ secrets.SENTINEL_SUBSCRIPTIONID }}
          audience: api://AzureADTokenExchange
          enable-AzPSSession: true

      - name: Enable Sentinel Solutions and Alert Rules
        uses: azure/powershell@v1
        with:
          azPSVersion: "latest"
          errorActionPreference: "Stop"
          inlineScript: |
            $ErrorActionPreference = "Stop"

            Write-Host "GITHUB_WORKSPACE=$env:GITHUB_WORKSPACE"
            Write-Host "Listing Scripts folder (if exists):"
            if (Test-Path (Join-Path $env:GITHUB_WORKSPACE "Scripts")) {
              Get-ChildItem (Join-Path $env:GITHUB_WORKSPACE "Scripts") -Force
            } else {
              Write-Host "Scripts folder NOT FOUND"
            }

            $scriptPath = Join-Path $env:GITHUB_WORKSPACE "Scripts/Set-SentinelContent.ps1"
            if (-not (Test-Path $scriptPath)) {
              throw "Script not found at: $scriptPath"
            }

            & $scriptPath `
              -ResourceGroup '${{ vars.RESOURCE_GROUP }}' `
              -Workspace '${{ vars.WORKSPACE_NAME }}' `
              -Region '${{ vars.REGION }}' `
              -Solutions ${{ vars.SENTINEL_SOLUTIONS }} `
              -SeveritiesToInclude ${{ vars.AR_SEVERITIES }} `
              -IsGov 'false'
