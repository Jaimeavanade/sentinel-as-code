
name: Deploy Sentinel Content

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.SENTINEL_CLIENTID }}
          tenant-id: ${{ secrets.SENTINEL_TENANTID }}
          subscription-id: ${{ secrets.SENTINEL_SUBSCRIPTIONID }}
          audience: api://AzureADTokenExchange
          enable-AzPSSession: true

      - name: Enable Sentinel Solutions and Alert Rules
        uses: azure/powershell@v1
        with:
          azPSVersion: "latest"
          errorActionPreference: "Stop"
          inlineScript: |
            $ErrorActionPreference = "Stop"

            $scriptPath = Join-Path $env:GITHUB_WORKSPACE "Scripts/Set-SentinelContent.ps1"
            if (-not (Test-Path $scriptPath)) {
              throw "Script not found at: $scriptPath"
            }

            & $scriptPath `
              -ResourceGroup '${{ vars.RESOURCE_GROUP }}' `
              -Workspace '${{ vars.WORKSPACE_NAME }}' `
              -Region '${{ vars.REGION }}' `
              -Solutions ${{ vars.SENTINEL_SOLUTIONS }} `
              -SeveritiesToInclude ${{ vars.AR_SEVERITIES }} `
              -IsGov 'false'
